<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Lista de Presentes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-5 font-sans" style="background-color: #f8fafc;">
    <div class="bg-white border border-gray-200/40 shadow-lg rounded-3xl max-w-md w-full">
        <div class="flex flex-col items-center text-center py-16 px-10">
            <svg class="w-24 h-24 text-[#e11d48] mb-8 opacity-90" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0z"/>
                <line x1="4" y1="4" x2="20" y2="20" stroke-linecap="round" stroke-width="2"/>
            </svg>
            <h1 class="text-4xl font-extrabold text-gray-800 mb-5">Voce esta offline</h1>
            <p class="text-lg text-gray-500 leading-relaxed mb-10">
                Parece que voce perdeu a conexao com a internet.
                Verifique sua conexao e tente novamente.
            </p>
            <button onclick="location.reload()" class="inline-flex items-center justify-center bg-[#e11d48] hover:bg-[#be123c] text-white rounded-xl px-10 py-3 text-lg font-semibold shadow-lg hover:-translate-y-0.5 transition-all duration-200">
                &#x21bb; Tentar Novamente
            </button>
        </div>
    </div>
</body>
</html>
